name: 'Teams Notification'
description: 'Send dynamic notifications to Microsoft Teams via Power Automate Workflow'

inputs:
  webhook_url:
    description: 'Microsoft Teams Workflow Webhook URL'
    required: true
  status:
    description: 'Build status (success, failure, cancelled, or custom)'
    required: true
  title:
    description: 'Notification title'
    required: false
    default: 'Build Notification'
  environment:
    description: 'Deployment environment'
    required: false
    default: ''
  step_name:
    description: 'Name of the step that triggered this notification'
    required: false
    default: ''
  custom_message:
    description: 'Additional custom message'
    required: false
    default: ''
  additional_facts:
    description: 'Additional facts in JSON format [{"title":"key","value":"val"}]'
    required: false
    default: '[]'
  priority:
    description: 'Notification priority (low, normal, high, critical)'
    required: false
    default: 'normal'
  mention_users:
    description: 'Comma-separated list of user names to mention'
    required: false
    default: ''

outputs:
  notification_id:
    description: 'Unique identifier for this notification'
    value: ${{ steps.generate-metadata.outputs.notification_id }}
  timestamp:
    description: 'Timestamp when notification was sent'
    value: ${{ steps.generate-metadata.outputs.timestamp }}
  payload_json:
    description: 'Complete notification payload as JSON (for downstream integrations like Jira)'
    value: ${{ steps.build-payload.outputs.payload_json }}
  status_code:
    description: 'HTTP status code from webhook'
    value: ${{ steps.send-notification.outputs.status_code }}

runs:
  using: 'composite'
  steps:
    - name: Generate Metadata
      id: generate-metadata
      shell: bash
      run: |
        # Generate unique notification ID
        NOTIFICATION_ID="${{ github.run_id }}-${RANDOM}-$(date +%s)"
        TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
        SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
        
        echo "notification_id=${NOTIFICATION_ID}" >> $GITHUB_OUTPUT
        echo "timestamp=${TIMESTAMP}" >> $GITHUB_OUTPUT
        echo "short_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT
        
        # Set status configuration
        case "${{ inputs.status }}" in
          success)
            echo "icon=✅" >> $GITHUB_OUTPUT
            echo "status_text=Succeeded" >> $GITHUB_OUTPUT
            ;;
          failure)
            echo "icon=❌" >> $GITHUB_OUTPUT
            echo "status_text=Failed" >> $GITHUB_OUTPUT
            ;;
          cancelled)
            echo "icon=⚠️" >> $GITHUB_OUTPUT
            echo "status_text=Cancelled" >> $GITHUB_OUTPUT
            ;;
          *)
            echo "icon=ℹ️" >> $GITHUB_OUTPUT
            echo "status_text=${{ inputs.status }}" >> $GITHUB_OUTPUT
            ;;
        esac
        
        # Set priority configuration
        case "${{ inputs.priority }}" in
          critical)
            echo "priority_icon=🚨" >> $GITHUB_OUTPUT
            echo "priority_text=CRITICAL" >> $GITHUB_OUTPUT
            ;;
          high)
            echo "priority_icon=🔴" >> $GITHUB_OUTPUT
            echo "priority_text=HIGH" >> $GITHUB_OUTPUT
            ;;
          low)
            echo "priority_icon=🔵" >> $GITHUB_OUTPUT
            echo "priority_text=LOW" >> $GITHUB_OUTPUT
            ;;
          *)
            echo "priority_icon=" >> $GITHUB_OUTPUT
            echo "priority_text=" >> $GITHUB_OUTPUT
            ;;
        esac

    - name: Build Payload for Downstream Integrations
      id: build-payload
      shell: bash
      run: |
        # Create payload JSON for future integrations (e.g., Jira)
        cat > /tmp/payload.json << 'PAYLOAD_EOF'
        {
          "metadata": {
            "notification_id": "${{ steps.generate-metadata.outputs.notification_id }}",
            "timestamp": "${{ steps.generate-metadata.outputs.timestamp }}",
            "source": "github-actions",
            "version": "1.0.0"
          },
          "context": {
            "repository": "${{ github.repository }}",
            "workflow": "${{ github.workflow }}",
            "run_id": "${{ github.run_id }}",
            "run_number": "${{ github.run_number }}",
            "job": "${{ github.job }}",
            "step_name": "${{ inputs.step_name }}",
            "environment": "${{ inputs.environment }}",
            "ref_name": "${{ github.ref_name }}",
            "sha": "${{ github.sha }}",
            "actor": "${{ github.actor }}",
            "event_name": "${{ github.event_name }}"
          },
          "notification": {
            "status": "${{ inputs.status }}",
            "status_text": "${{ steps.generate-metadata.outputs.status_text }}",
            "title": "${{ inputs.title }}",
            "message": "${{ inputs.custom_message }}",
            "priority": "${{ inputs.priority }}"
          }
        }
        PAYLOAD_EOF
        
        PAYLOAD_JSON=$(cat /tmp/payload.json | tr -d '\n' | tr -s ' ')
        echo "payload_json=${PAYLOAD_JSON}" >> $GITHUB_OUTPUT

    - name: Build and Send Teams Notification
      id: send-notification
      shell: bash
      run: |
        # Build the card body elements
        BODY_ELEMENTS=""
        
        # Title
        BODY_ELEMENTS='{"type":"TextBlock","size":"Large","weight":"Bolder","text":"${{ steps.generate-metadata.outputs.icon }} ${{ inputs.title }}","wrap":true}'
        
        # Status with priority
        PRIORITY_PREFIX=""
        if [ -n "${{ steps.generate-metadata.outputs.priority_text }}" ]; then
          PRIORITY_PREFIX="${{ steps.generate-metadata.outputs.priority_icon }} ${{ steps.generate-metadata.outputs.priority_text }} | "
        fi
        BODY_ELEMENTS="${BODY_ELEMENTS},{\"type\":\"TextBlock\",\"text\":\"${PRIORITY_PREFIX}**Status:** ${{ steps.generate-metadata.outputs.status_text }}\",\"wrap\":true}"
        
        # Environment
        if [ -n "${{ inputs.environment }}" ]; then
          BODY_ELEMENTS="${BODY_ELEMENTS},{\"type\":\"TextBlock\",\"text\":\"**Environment:** ${{ inputs.environment }}\",\"wrap\":true}"
        fi
        
        # Step name
        if [ -n "${{ inputs.step_name }}" ]; then
          BODY_ELEMENTS="${BODY_ELEMENTS},{\"type\":\"TextBlock\",\"text\":\"**Step:** ${{ inputs.step_name }}\",\"wrap\":true}"
        fi
        
        # Custom message
        if [ -n "${{ inputs.custom_message }}" ]; then
          BODY_ELEMENTS="${BODY_ELEMENTS},{\"type\":\"TextBlock\",\"text\":\"${{ inputs.custom_message }}\",\"wrap\":true}"
        fi
        
        # Mention users
        if [ -n "${{ inputs.mention_users }}" ]; then
          BODY_ELEMENTS="${BODY_ELEMENTS},{\"type\":\"TextBlock\",\"text\":\"**Attention:** ${{ inputs.mention_users }}\",\"wrap\":true}"
        fi
        
        # Facts
        BODY_ELEMENTS="${BODY_ELEMENTS},{\"type\":\"FactSet\",\"facts\":[{\"title\":\"Repository\",\"value\":\"${{ github.repository }}\"},{\"title\":\"Workflow\",\"value\":\"${{ github.workflow }}\"},{\"title\":\"Run\",\"value\":\"#${{ github.run_number }}\"},{\"title\":\"Branch\",\"value\":\"${{ github.ref_name }}\"},{\"title\":\"Commit\",\"value\":\"${{ steps.generate-metadata.outputs.short_sha }}\"},{\"title\":\"Actor\",\"value\":\"${{ github.actor }}\"}]}"
        
        # Notification ID
        BODY_ELEMENTS="${BODY_ELEMENTS},{\"type\":\"TextBlock\",\"text\":\"ID: ${{ steps.generate-metadata.outputs.notification_id }}\",\"size\":\"Small\",\"isSubtle\":true}"
        
        # Build complete payload
        PAYLOAD='{
          "type": "message",
          "attachments": [{
            "contentType": "application/vnd.microsoft.card.adaptive",
            "content": {
              "$schema": "http://adaptivecards.io/schemas/adaptive-card.json",
              "type": "AdaptiveCard",
              "version": "1.4",
              "body": ['"${BODY_ELEMENTS}"'],
              "actions": [
                {"type": "Action.OpenUrl", "title": "View Workflow", "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"},
                {"type": "Action.OpenUrl", "title": "View Commit", "url": "${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}"}
              ]
            }
          }]
        }'
        
        # Send notification
        HTTP_STATUS=$(curl -s -o /tmp/response.txt -w "%{http_code}" \
          -X POST \
          -H "Content-Type: application/json" \
          -d "${PAYLOAD}" \
          "${{ inputs.webhook_url }}")
        
        echo "status_code=${HTTP_STATUS}" >> $GITHUB_OUTPUT
        
        if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
          echo "::error::Teams notification failed with status ${HTTP_STATUS}"
          cat /tmp/response.txt
          exit 1
        fi
        
        echo "✅ Notification sent successfully (HTTP ${HTTP_STATUS})"